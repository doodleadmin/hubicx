# ===== ADMIN.HUBICX.RU =====
server {
    if ($host = admin.hubicx.ru) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name admin.hubicx.ru;
    return 404;
}

server {
    server_name admin.hubicx.ru;

    root /opt/ai_aggregator/webapp/public/app;
    index admin.html;

    location ^~ /app/assets/ {
        root /opt/ai_aggregator/webapp/public;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /app/ {
        root /opt/ai_aggregator/webapp/public;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /admin.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.hubicx.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hubicx.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}


