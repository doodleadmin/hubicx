<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hubicx — Генерация · H2 «Орбита» + десктоп</title>
<link rel="stylesheet" href="app/gen-moment.css" />
<link rel="stylesheet" href="app/gen-final.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- helpers (Phone, GIc, GStar, GMark, DetailRows…) — defined, not rendered -->
<script type="text/babel" src="app/gen-mockups.jsx"></script>
<script type="text/babel" src="app/gen-final.jsx"></script>

<script type="text/babel">
function Final(){
  const { GIc } = window;
  return <div className="stage">
    <div className="stage-h">
      <div>
        <div className="eyebrow">Hubicx · финальная реализация</div>
        <h1>Момент генерации — H1 «Холст»</h1>
        <p>Рабочий флоу: выберите шаблон (или вкладку «Свой промпт»), нажмите «Создать» — кадр проявляется прямо на месте: скелет в нужном формате со световым проходом, этапы и прогресс, затем результат «проступает» из размытия. На десктопе — переключатель светлой/тёмной темы.</p>
      </div>
    </div>

    <div className="stage-grid">
      <div className="slot">
        <div className="slot-cap"><span className="dotk"></span> <b>Мобайл</b> · Telegram mini-app <span className="tap-hint">— нажмите «Создать»</span></div>
        <window.HBMobileH1/>
      </div>
      <div className="slot">
        <div className="slot-cap"><span className="dotk"></span> <b>Десктоп</b> · светлая / тёмная <span className="tap-hint">— тема в правом верхнем углу</span></div>
        <window.HBDesktop/>
      </div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Final/>);
</script>
</body>
</html>
