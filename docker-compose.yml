services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_aggregator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file: .env
    depends_on:
      - backend
    command: python -m bot.main
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: celery -A worker.celery_app.celery_app worker --loglevel=info --pool=solo
    volumes:
      - .:/app

  webapp:
    image: node:20-alpine
    working_dir: /app/webapp
    env_file: .env
    environment:
      NEXT_PUBLIC_BACKEND_URL: https://api.hubicx.ru
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run build && npm run start -- -H 0.0.0.0"
    volumes:
      - .:/app

volumes:
  postgres_data:
