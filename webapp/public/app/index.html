<div id="root"></div>

<!-- Telegram Mini App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
(function() {
  var tg = window.Telegram && window.Telegram.WebApp;
  // Telegram desktop platforms
  var TG_PC = ['tdesktop', 'macos', 'linux', 'web', 'weba'];

  if (tg) {
    tg.ready();
    if (TG_PC.indexOf(tg.platform) !== -1) {
      // Telegram на ПК → сразу открываем desktop-версию
      window.location.replace('desktop.html');
      return;
    }
    // Мобильный Telegram → fullscreen + 100px safe area сверху
    if (typeof tg.requestFullscreen === 'function') tg.requestFullscreen();
    document.body.classList.add('tg-fs');
  }

})();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
