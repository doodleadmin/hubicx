<title>Hubicx</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<body>
<div id="root"></div>

<!-- Loading overlay (desktop + Telegram desktop) -->
<div class="wj-loader" id="wjLoader">
  <div class="wj-aurora1"></div>
  <div class="wj-aurora2"></div>
  <div class="wj-vignette"></div>
  <div class="wj-stage">
    <div class="wj-glow"></div>
    <canvas class="wj-canvas" id="wjCanvas"></canvas>
  </div>
  <div class="wj-texts">
    <div class="wj-phrases">
      <div class="wj-phrase">Готовим шаблоны</div>
      <div class="wj-phrase">Оживляем нейросеть</div>
      <div class="wj-phrase">Почти готово</div>
    </div>
    <div class="wj-track"><div class="wj-bar"></div></div>
  </div>
</div>

<!-- Desktop mode flag — must be set before any JSX loads -->
<script>window.DESKTOP_MODE = true;</script>

<!-- Telegram Mini App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
(function() {
  var host = String((window.location && window.location.hostname) || '').toLowerCase();
  window.HUBICX_APP_CONTEXT = host === 'webapp.hubicx.ru' ? 'telegram' : 'browser';
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) {
    tg.ready();
    if (typeof tg.requestFullscreen === 'function') tg.requestFullscreen();
  }
})();
</script>
